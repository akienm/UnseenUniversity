[build-system]
requires = ["setuptools"]
build-backend = "setuptools.build_meta"

[project]
name = "agent_datacenter"
version = "0.1.0"
description = "Runtime substrate for agent deployments — skeleton, IMAP bus, device/shim contracts"
requires-python = ">=3.11"
dependencies = [
    "click>=8.0",
    "mcp>=1.0",
    "pyyaml>=6.0",
    "python-diagnostic-base-class @ git+https://github.com/akienm/python_diagnostic_base_class.git",
]

[tool.setuptools.packages.find]
where = ["."]
include = ["agent_datacenter*", "bus*", "skeleton*", "devices*", "config*", "lab*"]

[project.scripts]
agentctl = "agent_datacenter.rack:main"
