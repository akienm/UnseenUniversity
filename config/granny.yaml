---
# Granny dispatch rules — first-match wins, top to bottom.
# Edit this file; the daemon reloads it every poll cycle.

workers:
  CC.0:
    dispatch: tmux_send_keys
    session: claude-main
    one_at_a_time: true        # defer if a claude ticket is already in_progress
  DickSimnel.0:
    dispatch: set_worker
    worker_name: dicksimnel    # DickSimnel polls and claims itself

rules:
  # HIGH-inertia tags always go to CC — no exceptions, no silent routing
  - when:
      tags_any: [Security, Provenance, Auth, Brainstem, Database]
    route_to: CC.0

  # Role routing
  - when:
      role_in: [master, guru]
    route_to: CC.0
  - when:
      role_in: [builder, creator]
    route_to: DickSimnel.0

  # Default fallback — anything not matched above goes to CC
  - route_to: CC.0
