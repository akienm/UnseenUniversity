---
# Granny dispatch rules — first-match wins, top to bottom.
# Edit this file; the daemon reloads it every poll cycle.

workers:
  CC.0:
    dispatch: bus
    mailbox: cc.0
    one_at_a_time: true        # defer if a claude ticket is already in_progress
    launch_cmd: null           # CC is launched manually / via tmux
  DickSimnel.0:
    dispatch: bus
    mailbox: dicksimnel.0
    launch_cmd: "cd /home/akien/dev/src/UnseenUniversity && .venv/bin/python3 -m devices.dicksimnel"

rules:
  # HIGH-inertia tags always go to CC — no exceptions, no silent routing
  - when:
      tags_any: [Security, Provenance, Auth, Brainstem, Database]
    route_to: CC.0

  # Role ladder: guru=Akien, master=CC.0, builder=DickSimnel
  - when:
      role_in: [guru]
    route_to: akien       # post NEEDS_AKIEN channel nudge, set worker=akien, do not dispatch
  - when:
      role_in: [master]
    route_to: CC.0
  - when:
      role_in: [builder, creator]
    route_to: DickSimnel.0

  # Default fallback — no role = conservative, goes to CC
  - route_to: CC.0
