# Google Secretary — rack device configuration profile
# Applied by skeleton during device registration.

device_id: google_secretary
name: Google Secretary

# OAuth token storage: "postgres" or "file"
token_storage: file
token_dir: "~/.unseen_university/google_secretary/tokens"

# Google API scopes
scopes:
  - https://www.googleapis.com/auth/calendar
  - https://www.googleapis.com/auth/gmail.modify
  - https://www.googleapis.com/auth/tasks

# Calendars managed by this device (email -> calendarId)
calendars:
  primary: "primary"
  # additional: "calendar-id@group.calendar.google.com"

# Gmail defaults
gmail:
  max_results: 20
  query_timeout_s: 30

# Tasks defaults
tasks:
  default_list: "@default"

# Dispatcher rules
dispatcher:
  escalate_on_ambiguity: true
  log_interface_crossings: true

# Shim lifecycle
shim:
  start_timeout_s: 10
  stop_timeout_s: 10
