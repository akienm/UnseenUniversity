# devices/librarian/config.cfg — Librarian device per-device config template.
#
# Copy to ~/.unseen_university/Librarian/config.cfg and edit.
# Overrides global uu.cfg values for the Librarian device only.
# Precedence: launch flag > this file > ~/.unseen_university/uu.cfg

[uu]
# frontend — which UI to use when ./uu launches Librarian chat.
# Values: terminal | web
# terminal: built-in stdin/stdout REPL
# web: open browser to web server device (ADC_WEB_PORT, default 8080)
default_frontend = terminal
