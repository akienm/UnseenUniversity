---
# Granny dispatch rules — first-match wins, top to bottom.
# Edit this file; the daemon reloads it every poll cycle.

# exact_match: when true, tickets with no matching role rule are deferred (logged
# and skipped) rather than falling through to the default catch-all.
# Set to true to prevent any cross-tier dispatch.
exact_match: false

workers:
  # CC workers self-announce via ~/.granny/announced/<worker_id>.json when
  # cc_worker_listener starts. No static entries needed — they'd become debris.
  # DickSimnel.0's front-door (Ground-Loop-managed) wakes it on bus dispatch; no launch_cmd.
  DickSimnel.0:
    dispatch: bus
    mailbox: dicksimnel.0
    worker_name: dicksimnel
    one_at_a_time: true   # synchronous builder — one ticket per cycle (no mailbox fan-out)
  # Aider.0 — aider-backed builder ($0 on Hex). A second builder; there is no
  # builder load-balancing yet (T-granny-builder-load-balancing), so it is opt-in
  # by the `Aider` tag rule below rather than sharing the generic builder role.
  Aider.0:
    dispatch: bus
    mailbox: aider.0
    worker_name: aider
    one_at_a_time: true   # synchronous builder — one ticket per cycle (no mailbox fan-out)

rules:
  # HIGH-inertia tags go to CC.0 (this box's careful worker) for careful handling.
  # No hardcoded worker_id — availability check gates the actual dispatch.
  - when:
      tags_any: [Security, Provenance, Auth, Brainstem, Database]
    route_to: CC.0

  # The old `Aider`-tag opt-in rule was RETIRED (T-granny-builder-load-balancing):
  # the tag doubled as aider's own TOPIC tag, so Granny vacuumed aider-ABOUT tickets
  # (swarm-deployment, real-uu-ticket-proof) to the builder. Builder tickets now
  # load-balance across available builders in the dispatch loop (_select_builder).

  # Role ladder: guru=Akien, master=CC.0 (this box; a local CC.1 builder would crash
  # this 4-core/16GB box — the builders run off-machine on Hex).
  - when:
      role_in: [guru]
    route_to: akien       # post NEEDS_AKIEN channel nudge, set worker=akien, do not dispatch
  - when:
      role_in: [master]
    route_to: CC.0
  # Nominal builder target; the dispatch loop's _select_builder overrides this with
  # an AVAILABLE builder (DickSimnel.0 / Aider.0 / …) — this is just the fallback name.
  - when:
      role_in: [builder, creator]
    route_to: DickSimnel.0

  # Default fallback — no role = conservative, goes to CC.0
  - route_to: CC.0
